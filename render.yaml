services:
  - type: web
    name: vitconnect-backend
    plan: free
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
